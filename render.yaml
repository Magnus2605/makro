# Render Blueprint — gratis Python-webapp (sov efter inaktivitet på Free-plan).
# Opret repo på GitHub → New Blueprint på Render → vælg denne fil.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: makrotool
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    healthCheckPath: /
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PYTHON_VERSION
        value: "3.11.8"
